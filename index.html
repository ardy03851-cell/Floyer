<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Foyer</title>
  <link rel="icon" type="image/png" href="Icons/icon.png">
   
  <link rel="apple-touch-icon" href="Icons/icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#FAFAF8">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --floor: #FAFAF8;
      --tile: #FFFFFF;
      --seam: #E8E6E1;
      --stone-shadow: #C9C5BC;
      --ink: #2B2A28;
      --ink-soft: #6B6862;
      --vein: #8E97A8;
      --vein-deep: #6F7A8E;
      --shimmer: rgba(255, 255, 255, 0.85);
      --danger: #B3493F;
      --radius: 16px;
      --radius-sm: 10px;
      font-size: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--floor);
      color: var(--ink);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      height: 100%;
      overscroll-behavior-y: none;
    }

    /* polished floor base texture: soft radial sheen + tile grid */
    body {
      background-image:
        radial-gradient(ellipse 900px 500px at 20% -10%, rgba(255, 255, 255, 0.9), transparent 60%),
        radial-gradient(ellipse 700px 400px at 100% 30%, rgba(255, 255, 255, 0.6), transparent 60%),
        linear-gradient(var(--seam) 1px, transparent 1px),
        linear-gradient(90deg, var(--seam) 1px, transparent 1px);
      background-size: auto, auto, 96px 96px, 96px 96px;
      background-color: var(--floor);
      min-height: 100vh;
    }

    h1,
    h2,
    h3,
    .display {
      font-family: "Fraunces", serif;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }

    input,
    textarea {
      font-family: inherit;
    }

    /* ---------- shimmer keyframes ---------- */
    @keyframes sweep {
      0% {
        transform: translateX(-120%) rotate(8deg);
        opacity: 1;
      }

      100% {
        transform: translateX(220%) rotate(8deg);
        opacity: 0;
      }
    }

    .shimmer-surface {
      position: relative;
      overflow: hidden;
    }

    .shimmer-surface::after {
      content: "";
      position: absolute;
      top: -50%;
      left: 0;
      width: 40%;
      height: 220%;
      background: linear-gradient(100deg,
          transparent 30%,
          rgba(255, 255, 255, 0.55) 48%,
          rgba(255, 255, 255, 0.85) 50%,
          rgba(255, 255, 255, 0.55) 52%,
          transparent 70%);
      pointer-events: none;
      opacity: 0;
    }

    .shimmer-surface.shimmer-play::after {
      animation: sweep 1.1s ease-out forwards;
    }

    /* ---------- modal entrance ---------- */
    @keyframes backdropIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.94) translateY(8px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-backdrop {
      animation: backdropIn 0.18s ease-out forwards;
    }

    .modal {
      animation: modalIn 0.22s cubic-bezier(0.34, 1.36, 0.64, 1) forwards;
    }

    /* ---------- post feed entrance ---------- */
    @keyframes postIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .post {
      animation: postIn 0.28s ease-out both;
    }

    /* ---------- comment slide ---------- */
    @keyframes commentsSlide {
      from {
        opacity: 0;
        max-height: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        max-height: 2000px;
        transform: translateY(0);
      }
    }

    .comments.open {
      animation: commentsSlide 0.28s ease-out forwards;
      overflow: hidden;
    }

    /* ---------- vote pop ---------- */
    @keyframes votePop {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.35);
      }

      100% {
        transform: scale(1);
      }
    }

    .vote-btn.pop {
      animation: votePop 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ---------- top bar ---------- */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 22px;
      margin: 14px 16px 0 16px;
      background: linear-gradient(180deg, #FFFFFF, #FBFBF9);
      border-radius: var(--radius);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 -6px 14px -8px rgba(0, 0, 0, 0.04) inset,
        0 10px 24px -12px rgba(60, 55, 45, 0.18),
        0 2px 6px rgba(60, 55, 45, 0.06);
      border: 1px solid var(--seam);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand img {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: block;
    }

    .brand .name {
      font-family: "Fraunces", serif;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .brand .name .dot {
      color: var(--vein);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ---------- buttons ---------- */
    .btn {
      border: 1px solid var(--seam);
      background: linear-gradient(180deg, #FFFFFF, #F7F6F3);
      color: var(--ink);
      padding: 9px 16px;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.9) inset, 0 2px 5px rgba(60, 55, 45, 0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.9) inset, 0 4px 10px rgba(60, 55, 45, 0.12);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(180deg, var(--vein), var(--vein-deep));
      color: #fff;
      border: 1px solid var(--vein-deep);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.35) inset, 0 4px 12px rgba(111, 122, 142, 0.35);
    }

    .btn-primary:hover {
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.35) inset, 0 6px 16px rgba(111, 122, 142, 0.45);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid transparent;
      box-shadow: none;
      color: var(--ink-soft);
    }

    .btn-ghost:hover {
      background: var(--seam);
      box-shadow: none;
    }

    .btn-danger {
      color: var(--danger);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .avatar-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px 6px 6px;
      border-radius: 999px;
      background: var(--seam);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink-soft);
    }

    .avatar-circle {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(160deg, var(--vein), var(--vein-deep));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ---------- layout ---------- */
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 16px 80px;
    }

    .composer {
      background: linear-gradient(180deg, #FFFFFF, #FBFBF9);
      border: 1px solid var(--seam);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 26px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 14px 30px -16px rgba(60, 55, 45, 0.16),
        0 2px 6px rgba(60, 55, 45, 0.05);
    }

    .composer textarea,
    .composer input[type="text"] {
      width: 100%;
      border: 1px solid var(--seam);
      background: var(--floor);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-size: 0.95rem;
      color: var(--ink);
      resize: vertical;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .composer input[type="text"] {
      margin-bottom: 10px;
    }

    .composer textarea {
      min-height: 70px;
    }

    .composer textarea:focus,
    .composer input[type="text"]:focus {
      border-color: var(--vein);
      box-shadow: 0 0 0 3px rgba(142, 151, 168, 0.16);
    }

    .composer-foot {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .composer-hint {
      font-size: 0.8rem;
      color: var(--ink-soft);
      margin-right: auto;
    }

    .feed-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 4px;
    }

    .feed-header h2 {
      font-size: 1.05rem;
      color: var(--ink-soft);
      font-weight: 500;
    }

    .sort-tabs {
      display: flex;
      gap: 4px;
      background: var(--seam);
      padding: 3px;
      border-radius: 999px;
    }

    .sort-tabs button {
      border: none;
      background: transparent;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink-soft);
    }

    .sort-tabs button.active {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 1px 3px rgba(60, 55, 45, 0.15);
    }

    /* ---------- post tile ---------- */
    .post {
      background: var(--tile);
      border: 1px solid var(--seam);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 14px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 10px 22px -14px rgba(60, 55, 45, 0.14),
        0 1px 4px rgba(60, 55, 45, 0.05);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .post:hover {
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 16px 30px -16px rgba(60, 55, 45, 0.20),
        0 2px 6px rgba(60, 55, 45, 0.06);
      transform: translateY(-2px);
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    .post-meta .sep {
      opacity: 0.5;
    }

    .post h3 {
      font-size: 1.12rem;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .post p.body {
      font-size: 0.92rem;
      color: #45433f;
      line-height: 1.55;
      margin: 0 0 12px 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .post-media {
      margin-bottom: 12px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--seam);
      max-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .post-media img {
      width: 100%;
      max-height: 420px;
      object-fit: contain;
      display: block;
      border-radius: var(--radius-sm);
    }

    .post-media video {
      width: 100%;
      max-height: 420px;
      border-radius: var(--radius-sm);
      outline: none;
    }

    .media-preview-wrap {
      margin-top: 10px;
      position: relative;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--seam);
      max-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .media-preview-wrap img,
    .media-preview-wrap video {
      max-width: 100%;
      max-height: 200px;
      object-fit: contain;
      border-radius: var(--radius-sm);
    }

    .media-remove-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      border: none;
      background: rgba(43, 42, 40, 0.65);
      color: #fff;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .post-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .vote-group {
      display: flex;
      align-items: center;
      gap: 2px;
      background: var(--floor);
      border: 1px solid var(--seam);
      border-radius: 999px;
      padding: 4px 6px;
    }

    .vote-btn {
      border: none;
      background: transparent;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-soft);
      font-size: 0.95rem;
      padding: 0;
    }

    .vote-btn:hover {
      background: var(--seam);
    }

    .vote-btn.voted {
      color: var(--vein-deep);
    }

    .vote-count {
      font-size: 0.85rem;
      font-weight: 700;
      min-width: 22px;
      text-align: center;
    }

    .icon-btn {
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink-soft);
    }

    .icon-btn:hover {
      background: var(--seam);
    }

    .icon-btn svg {
      width: 15px;
      height: 15px;
    }

    /* ---------- comments ---------- */
    .comments {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--seam);
      display: none;
    }

    .comments.open {
      display: block;
      overflow: hidden;
    }

    .comment {
      display: flex;
      gap: 10px;
      padding: 8px 0;
    }

    .comment .avatar-circle {
      width: 22px;
      height: 22px;
      font-size: 0.65rem;
    }

    .comment-body {
      flex: 1;
    }

    .comment-meta {
      font-size: 0.76rem;
      color: var(--ink-soft);
      margin-bottom: 2px;
      font-weight: 600;
    }

    .comment-text {
      font-size: 0.88rem;
      color: #3c3a36;
      line-height: 1.45;
    }

    .comment-form {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .comment-form input {
      flex: 1;
      border: 1px solid var(--seam);
      background: var(--floor);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.85rem;
      outline: none;
    }

    .comment-form input:focus {
      border-color: var(--vein);
      box-shadow: 0 0 0 3px rgba(142, 151, 168, 0.16);
    }

    .comment-form button {
      border: none;
      background: var(--vein);
      color: #fff;
      border-radius: 999px;
      padding: 0 16px;
      font-weight: 700;
      font-size: 0.85rem;
    }

    /* ---------- empty / loading states ---------- */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft);
    }

    .empty-state .display {
      font-size: 1.3rem;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 0.9rem;
      margin: 0;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2.5px solid var(--seam);
      border-top-color: var(--vein);
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-wrap {
      padding: 50px 0;
    }

    /* ---------- auth modal ---------- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(43, 42, 40, 0.35);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
      animation: backdropIn 0.18s ease-out forwards;
    }

    .modal {
      background: linear-gradient(180deg, #FFFFFF, #FBFBF9);
      border-radius: 20px;
      padding: 30px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 30px 60px -20px rgba(43, 42, 40, 0.35), 0 1px 0 rgba(255, 255, 255, 0.9) inset;
      border: 1px solid var(--seam);
      position: relative;
      overflow: hidden;
    }

    .modal h2 {
      font-size: 1.4rem;
      margin-bottom: 4px;
    }

    .modal .sub {
      color: var(--ink-soft);
      font-size: 0.88rem;
      margin-bottom: 20px;
    }

    .modal label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-soft);
      margin-bottom: 5px;
      margin-top: 14px;
    }

    .modal input {
      width: 100%;
      border: 1px solid var(--seam);
      background: var(--floor);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      font-size: 0.92rem;
      outline: none;
    }

    .modal input:focus {
      border-color: var(--vein);
      box-shadow: 0 0 0 3px rgba(142, 151, 168, 0.16);
    }

    .modal .btn-primary {
      width: 100%;
      margin-top: 20px;
      padding: 11px;
      font-size: 0.92rem;
    }

    .modal .switch-mode {
      text-align: center;
      margin-top: 16px;
      font-size: 0.84rem;
      color: var(--ink-soft);
    }

    .modal .switch-mode button {
      border: none;
      background: none;
      color: var(--vein-deep);
      font-weight: 700;
      font-size: 0.84rem;
      padding: 0;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      border: none;
      background: var(--seam);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      color: var(--ink-soft);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-error {
      background: #FBEDEC;
      color: var(--danger);
      border: 1px solid #F0D2CF;
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-size: 0.82rem;
      margin-top: 14px;
      display: none;
    }

    .auth-error.show {
      display: block;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: #fff;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 200;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 480px) {
      .topbar {
        margin: 10px 10px 0 10px;
        padding: 12px 16px;
      }

      .wrap {
        padding: 20px 12px 70px;
      }

      .brand .name {
        font-size: 1.1rem;
      }
    }

    @media (max-width: 720px) {
      .dm-sidebar {
        width: 100vw;
      }
    }

    /* iOS Safari zooms in on any input/textarea under 16px on focus — this stops it */
    input,
    textarea,
    select {
      font-size: max(16px, 1rem);
    }

    /* Respect notch / home-indicator safe areas on iPhone and modern Android */
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    .dm-input-row {
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
    }

    .call-overlay {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Prevent double-tap zoom flicker on tap targets across all touch devices */
    .btn,
    .reaction-btn,
    .vote-btn,
    .icon-btn,
    .inbox-btn,
    .avatar-pill,
    .dm-thread-row,
    .call-ctrl-btn,
    .sort-tabs button {
      touch-action: manipulation;
    }

    @media (prefers-reduced-motion: reduce) {
      .shimmer-surface::after {
        animation: none !important;
      }

      .post,
      .btn {
        transition: none !important;
      }
    }

    *:focus-visible {
      outline: 2px solid var(--vein-deep);
      outline-offset: 2px;
    }

    /* ---------- reactions ---------- */
    .reaction-bar {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding: 6px;
      border-top: 1px solid var(--seam);
      background: var(--floor);
      border-radius: 999px;
      width: fit-content;
      max-width: 100%;
    }

    .reaction-btn {
      border: 1px solid transparent;
      background: transparent;
      border-radius: 999px;
      padding: 5px 11px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--ink-soft);

  <script type="module">

function showToast(msg) {

function playShimmer(el) {

  el.addEventListener("animationend", () => el.classList.remove("shimmer-play"), { once: true });

function initials(name) {
  if (!name) return "?";
  const parts = name.trim().split(/\s+/);
  return (parts[0][0] + (parts[1] ? parts[1][0] : "")).toUpperCase();
}

function avatarHtml(name, photoURL, sizePx, avatarBorder) {
  const size = sizePx || 26;
  const borderStyles = {
    none:   "",
    ring:   `box-shadow:0 0 0 2px var(--vein);`,
    double: `box-shadow:0 0 0 2px var(--floor),0 0 0 4px var(--vein);`
  };
  const borderStyle = borderStyles[avatarBorder] || "";
  if (photoURL) {
    return `<span class="avatar-circle" style="width:${size}px;height:${size}px;padding:0;overflow:hidden;${borderStyle}"><img src="${escapeHtml(photoURL)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></span>`;
  }
  return `<span class="avatar-circle" style="width:${size}px;height:${size}px;font-size:${Math.max(10, size * 0.4)}px;${borderStyle}">${initials(name)}</span>`;
}

async function getUserProfile(uid) {
  if (userCache.has(uid)) return userCache.get(uid);
  try {
    const snap = await getDoc(doc(db, "users", uid));
    const data = snap.exists() ? snap.data() : {};
    const profile = {
      displayName: data.displayName || null,
      photoURL: data.photoURL || null,
      isDeveloper: data.isDeveloper === true,
      isVerifiedOverride: data.isVerifiedOverride === true,
      pronouns: data.pronouns || "",
      statusLine: data.statusLine || "",
      postCount: data.postCount || 0,
      totalUpvotes: data.totalUpvotes || 0,
      equippedBadges: Array.isArray(data.equippedBadges) ? data.equippedBadges : [],
      bio: data.bio || "",
      accentColor: data.accentColor || null,
      avatarBorder: data.avatarBorder || "none"
    };
    userCache.set(uid, profile);
    return profile;
  } catch (err) {
    return { displayName: null, photoURL: null, isDeveloper: false, isVerifiedOverride: false, postCount: 0, totalUpvotes: 0, equippedBadges: [], bio: "", accentColor: null, avatarBorder: "none", pronouns: "", statusLine: "" };
  }
}

const BADGE_INFO = {
  verified: { label: "Verified", icon: "Bdg/verified.png" },
  popular:  { label: "Popular",  icon: "Bdg/popular.png" },
  super:    { label: "Super Poster", icon: "Bdg/super.png" }
};
const POPULAR_UPVOTE_THRESHOLD = 100;
const SUPER_POST_THRESHOLD = 50;
const VERIFIED_DAYS_REQUIRED = 7;

function getEarnedBadges(profile, authUser) {
  const earned = [];
  const accountCreatedAt = authUser && authUser.metadata && authUser.metadata.creationTime
    ? new Date(authUser.metadata.creationTime) : null;
  const daysSinceCreation = accountCreatedAt ? (Date.now() - accountCreatedAt.getTime()) / (1000 * 60 * 60 * 24) : 0;

  if ((profile && profile.isVerifiedOverride) || daysSinceCreation >= VERIFIED_DAYS_REQUIRED) {
    earned.push("verified");
  }
  if (profile && profile.totalUpvotes >= POPULAR_UPVOTE_THRESHOLD) {
    earned.push("popular");
  }
  if (profile && profile.postCount >= SUPER_POST_THRESHOLD) {
    earned.push("super");
  }
  return earned;
}

function badgeRowHtml(equippedBadges, sizePx) {
  const size = sizePx || 14;
  if (!equippedBadges || equippedBadges.length === 0) return "";
  return equippedBadges
    .filter(key => BADGE_INFO[key])
    .map(key => `<img src="${BADGE_INFO[key].icon}" alt="${BADGE_INFO[key].label}" title="${BADGE_INFO[key].label}" style="width:${size}px;height:${size}px;vertical-align:middle;margin-left:2px;">`)
    .join("");
}

function timeAgo(ts) {
  if (!ts) return "just now";
  const date = ts.toDate ? ts.toDate() : new Date(ts);
  const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
  if (seconds < 60) return "just now";
  const mins = Math.floor(seconds / 60);
  if (mins < 60) return mins + "m ago";
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + "h ago";
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + "d ago";
  return date.toLocaleDateString();
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

/* ---------------- AUTH UI ---------------- */

function applyAccentColor(color) {
  const ACCENTS = {
    slate:  ["#8E97A8", "#6F7A8E"],
    rose:   ["#B07080", "#8E5565"],
    sage:   ["#7A9E87", "#5C7D69"],
    amber:  ["#A8946A", "#8A7450"],
    plum:   ["#9B7FAE", "#7A618C"],
    ink:    ["#6B6862", "#4A4742"]
  };
  const pair = ACCENTS[color] || ACCENTS["slate"];
  document.documentElement.style.setProperty("--vein", pair[0]);
  document.documentElement.style.setProperty("--vein-deep", pair[1]);
}

        <label for="authEmail">Email</label>
        <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email">

        <label for="authPassword">Password</label>
        <input type="password" id="authPassword" placeholder="At least 6 characters" autocomplete="${mode === "signin" ? "current-password" : "new-password"}">

        <div class="auth-error" id="authErrorBox"></div>

        <button class="btn btn-primary" id="authSubmitBtn">${mode === "signin" ? "Sign in" : "Create account"}</button>

        <div class="switch-mode">
          ${mode === "signin"
            ? `New here? <button id="switchModeBtn">Create an account</button>`
            : `Already have an account? <button id="switchModeBtn">Sign in</button>`}
        </div>
      </div>
    </div>
  `;

  const backdrop = document.getElementById("modalBackdrop");
  const closeBtn = document.getElementById("modalCloseBtn");
  const switchBtn = document.getElementById("switchModeBtn");
  const submitBtn = document.getElementById("authSubmitBtn");
  const errorBox = document.getElementById("authErrorBox");

  setTimeout(() => playShimmer(document.getElementById("authModal")), 50);

  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) closeAuthModal(); });
  closeBtn.addEventListener("click", closeAuthModal);
  switchBtn.addEventListener("click", () => openAuthModal(mode === "signin" ? "signup" : "signin"));

  submitBtn.addEventListener("click", async () => {
    errorBox.classList.remove("show");
    const email = document.getElementById("authEmail").value.trim();
    const password = document.getElementById("authPassword").value;
    const name = mode === "signup" ? document.getElementById("authName").value.trim() : null;

    if (!email || !password) {
      errorBox.textContent = "Please fill in all fields.";
      errorBox.classList.add("show");
      return;
    }
    if (mode === "signup" && !name) {
      errorBox.textContent = "Please choose a display name.";
      errorBox.classList.add("show");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = mode === "signin" ? "Signing in..." : "Creating account...";

    try {
      if (mode === "signin") {
        await signInWithEmailAndPassword(auth, email, password);
      } else {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: name });
        await setDoc(doc(db, "users", cred.user.uid), {
          displayName: name,
          email: email,
          createdAt: serverTimestamp()
        });
      }
      closeAuthModal();
      showToast(mode === "signin" ? "Welcome back!" : "Account created!");
    } catch (err) {
      errorBox.textContent = friendlyAuthError(err);
      errorBox.classList.add("show");
      submitBtn.disabled = false;
      submitBtn.textContent = mode === "signin" ? "Sign in" : "Create account";
    }
  });
}

function friendlyAuthError(err) {
  const code = err.code || "";
  if (code.includes("email-already-in-use")) return "That email is already registered. Try signing in.";
  if (code.includes("invalid-email")) return "That email address doesn't look right.";
  if (code.includes("weak-password")) return "Password should be at least 6 characters.";
  if (code.includes("user-not-found") || code.includes("wrong-password") || code.includes("invalid-credential")) return "Incorrect email or password.";
  if (code.includes("too-many-requests")) return "Too many attempts. Please wait a moment and try again.";
  return "Something went wrong. Please try again.";
}

  modalRoot.innerHTML = "";

let callTimer = null;
let callSeconds = 0;
let isMuted = false;
let localStream = null;
let peerConn = null;
let callListenerUnsub = null;

function startCall(otherUid, otherName, otherProfile) {
  const overlay = document.getElementById("callOverlay");
  const avatarEl = document.getElementById("callAvatar");
  const nameEl = document.getElementById("callName");
  const statusEl = document.getElementById("callStatus");
  const durationEl = document.getElementById("callDuration");
  const muteBtn = document.getElementById("callMuteBtn");
  const endBtn = document.getElementById("callEndBtn");

  const avatarContent = (otherProfile && otherProfile.photoURL)
    ? `<img src="${escapeHtml(otherProfile.photoURL)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
    : initials(otherName);
  avatarEl.innerHTML = avatarContent;
  nameEl.textContent = otherName;
  statusEl.textContent = "Calling…";
  durationEl.textContent = "";
  isMuted = false;
  muteBtn.textContent = "🎤";
  muteBtn.classList.remove("muted");
  callSeconds = 0;
  overlay.classList.add("active");

  navigator.mediaDevices.getUserMedia({ audio: true, video: false })
    .then(stream => {
      localStream = stream;
      statusEl.textContent = "Connected";
      callTimer = setInterval(() => {
        callSeconds++;
        const m = String(Math.floor(callSeconds / 60)).padStart(2, "0");
        const s = String(callSeconds % 60).padStart(2, "0");
        durationEl.textContent = `${m}:${s}`;
      }, 1000);
    })
    .catch(() => {
      statusEl.textContent = "Mic access denied — voice disabled";
      callTimer = setInterval(() => {
        callSeconds++;
        const m = String(Math.floor(callSeconds / 60)).padStart(2, "0");
        const s = String(callSeconds % 60).padStart(2, "0");
        durationEl.textContent = `${m}:${s}`;
      }, 1000);
    });

  muteBtn.onclick = () => {
    isMuted = !isMuted;
    if (localStream) localStream.getAudioTracks().forEach(t => { t.enabled = !isMuted; });
    muteBtn.classList.toggle("muted", isMuted);
    muteBtn.textContent = isMuted ? "🔇" : "🎤";
  };

  endBtn.onclick = () => {
    overlay.classList.remove("active");
    if (callTimer) { clearInterval(callTimer); callTimer = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    callSeconds = 0;
    durationEl.textContent = "";
  };
}

const MAX_AVATAR_BYTES = 5 * 1024 * 1024; // 5MB raw file cap, before compression
const ALLOWED_IMAGE_TYPES = ["image/jpeg", "image/png", "image/webp", "image/gif"];
const AVATAR_MAX_DIMENSION = 300; // px, longest side after resize
const FIRESTORE_FIELD_SAFE_BYTES = 700 * 1024; // stay safely under Firestore's 1MB field cap

function compressImageToBase64(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(file);

    img.onload = () => {
      URL.revokeObjectURL(objectUrl);

      let { width, height } = img;
      if (width > height && width > AVATAR_MAX_DIMENSION) {
        height = Math.round(height * (AVATAR_MAX_DIMENSION / width));
        width = AVATAR_MAX_DIMENSION;
      } else if (height > AVATAR_MAX_DIMENSION) {
        width = Math.round(width * (AVATAR_MAX_DIMENSION / height));
        height = AVATAR_MAX_DIMENSION;
      }

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);

      let quality = 0.85;
      let dataUrl = canvas.toDataURL("image/jpeg", quality);

      while (dataUrl.length > FIRESTORE_FIELD_SAFE_BYTES && quality > 0.3) {
        quality -= 0.1;
        dataUrl = canvas.toDataURL("image/jpeg", quality);
      }

      if (dataUrl.length > FIRESTORE_FIELD_SAFE_BYTES) {
        reject(new Error("Image is too detailed to compress small enough. Try a simpler image."));
        return;
      }

      resolve(dataUrl);
    };

    img.onerror = () => {
      URL.revokeObjectURL(objectUrl);
      reject(new Error("Couldn't read that image file."));
    };

    img.src = objectUrl;
  });
}

const MAX_POST_IMAGE_BYTES = 10 * 1024 * 1024;
const MAX_POST_VIDEO_BYTES = 8 * 1024 * 1024;
const POST_IMAGE_MAX_DIM = 1200;
const POST_IMAGE_QUALITY = 0.82;
const POST_FIRESTORE_SAFE = 900 * 1024;

function compressPostImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let { width, height } = img;
      if (width > POST_IMAGE_MAX_DIM || height > POST_IMAGE_MAX_DIM) {
        if (width > height) { height = Math.round(height * POST_IMAGE_MAX_DIM / width); width = POST_IMAGE_MAX_DIM; }
        else { width = Math.round(width * POST_IMAGE_MAX_DIM / height); height = POST_IMAGE_MAX_DIM; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      let q = POST_IMAGE_QUALITY;
      let dataUrl = canvas.toDataURL("image/jpeg", q);
      while (dataUrl.length > POST_FIRESTORE_SAFE && q > 0.3) { q -= 0.08; dataUrl = canvas.toDataURL("image/jpeg", q); }
      if (dataUrl.length > POST_FIRESTORE_SAFE) { reject(new Error("Image too large to attach even after compression. Try a smaller image.")); return; }
      resolve(dataUrl);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Couldn't read image.")); };
    img.src = url;
  });
}

function encodeVideoToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("Couldn't read video."));
    reader.readAsDataURL(file);
  });
}

    if (!btn) return;
    selectedAccent = btn.dataset.accent;
    document.querySelectorAll("#accentPicker [data-accent]").forEach(b => {

      b.style.border = isNow ? "3px solid var(--ink)" : "2px solid transparent";
      b.style.outline = isNow ? `2px solid ${b.style.background}` : "none";
      b.style.transform = isNow ? "scale(1.15)" : "scale(1)";
    });

  });

  document.getElementById("borderPicker").addEventListener("click", (e) => {
    const btn = e.target.closest("[data-border]");
    if (!btn) return;
    selectedBorder = btn.dataset.border;
    document.querySelectorAll("#borderPicker [data-border]").forEach(b => {
      const isNow = b.dataset.border === selectedBorder;
      b.style.border = `1px solid ${isNow ? "var(--vein)" : "var(--seam)"}`;
      b.style.background = isNow ? "rgba(142,151,168,0.12)" : "var(--floor)";
    });

  backdrop.addEventListener("click", (e) => { if (e.target === backdrop) closeAuthModal(); });
  closeBtn.addEventListener("click", closeAuthModal);
  chooseBtn.addEventListener("click", () => fileInput.click());

  let pendingDataUrl = null;

  fileInput.addEventListener("change", async () => {
    errorBox.classList.remove("show");
    const file = fileInput.files && fileInput.files[0];
    if (!file) return;

    if (!ALLOWED_IMAGE_TYPES.includes(file.type)) {
      errorBox.textContent = "Please choose a JPG, PNG, WEBP, or GIF image.";
      errorBox.classList.add("show");
      fileInput.value = "";
      return;
    }
    if (file.size > MAX_AVATAR_BYTES) {
      errorBox.textContent = "That image is too large. Max size is 5MB.";
      errorBox.classList.add("show");
      fileInput.value = "";
      return;
    }

    chooseBtn.disabled = true;
    chooseBtn.textContent = "Processing...";

    try {
      const dataUrl = await compressImageToBase64(file);
      pendingDataUrl = dataUrl;
      previewWrap.innerHTML = `<span class="avatar-circle" style="width:88px;height:88px;padding:0;overflow:hidden;"><img src="${dataUrl}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></span>`;
    } catch (err) {
      errorBox.textContent = err.message || "Couldn't process that image.";
      errorBox.classList.add("show");
      fileInput.value = "";
    } finally {
      chooseBtn.disabled = false;
      chooseBtn.textContent = "Change photo";
    }
  });

  saveBtn.addEventListener("click", async () => {
    errorBox.classList.remove("show");
    const newName = document.getElementById("profileNameInput").value.trim();
    if (!newName) {
      errorBox.textContent = "Please choose a display name.";
      errorBox.classList.add("show");
      return;
    }

    saveBtn.disabled = true;
    saveBtn.textContent = "Saving...";

    try {
      const newPhotoURL = pendingDataUrl || (myProfile && myProfile.photoURL) || null;

      const finalEquipped = Array.from(equippedSet).slice(0, 2);
      const newBio = document.getElementById("profileBioInput").value.trim().slice(0, 120);
      const newPronouns = document.getElementById("profilePronounsInput").value.trim().slice(0, 20);
      const newStatusLine = document.getElementById("profileStatusInput").value.trim().slice(0, 40);

      await updateProfile(currentUser, { displayName: newName });
      await setDoc(doc(db, "users", currentUser.uid), {
        displayName: newName,
        photoURL: newPhotoURL,
        email: currentUser.email,
        equippedBadges: finalEquipped,
        bio: newBio,
        accentColor: selectedAccent,
        avatarBorder: selectedBorder,
        pronouns: newPronouns,
        statusLine: newStatusLine
      }, { merge: true });

      myProfile = { ...(myProfile || {}), displayName: newName, photoURL: newPhotoURL, equippedBadges: finalEquipped, bio: newBio, accentColor: selectedAccent, avatarBorder: selectedBorder, pronouns: newPronouns, statusLine: newStatusLine };
      userCache.set(currentUser.uid, { ...(userCache.get(currentUser.uid) || {}), displayName: newName, photoURL: newPhotoURL, isDeveloper: (myProfile && myProfile.isDeveloper) || false, equippedBadges: finalEquipped, bio: newBio, accentColor: selectedAccent, avatarBorder: selectedBorder, pronouns: newPronouns, statusLine: newStatusLine });
      applyAccentColor(selectedAccent);

      renderAuthArea();
      closeAuthModal();
      showToast("Profile updated");
    } catch (err) {
      errorBox.textContent = "Couldn't save changes. Please try again.";
      errorBox.classList.add("show");
      console.error(err);
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = "Save changes";
    }
  });
}

document.querySelectorAll(".sort-tabs button").forEach(btn => {

function renderFeed() {
  if (allPosts.length === 0) {
    feed.innerHTML = `
      <div class="empty-state">
        <div class="display">The floor is quiet</div>
        <p>Be the first to leave a mark on the tiles.</p>
      </div>`;
    return;
  }

  const sorted = [...allPosts].sort((a, b) => {
    if (currentSort === "top") return (b.score || 0) - (a.score || 0);
    const aTime = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : 0;
    const bTime = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : 0;
    return bTime - aTime;
  });

  feed.innerHTML = sorted.map(post => renderPost(post)).join("");

  sorted.forEach(post => attachPostListeners(post.id));
}

function renderPost(post) {
  const userVote = post._myVote || 0;
  const isCommentsOpen = openComments.has(post.id);
  const comments = post._comments || [];
  const liveAuthor = userCache.get(post.authorId);
  const authorName = (liveAuthor && liveAuthor.displayName) || post.authorName;
  const authorPhoto = liveAuthor && liveAuthor.photoURL;
  const authorIsDev = liveAuthor ? liveAuthor.isDeveloper : post.authorIsDeveloper;

  return `
    <div class="post" data-id="${post.id}">
      <div class="post-meta">
        ${avatarHtml(authorName, authorPhoto, 18, liveAuthor && liveAuthor.avatarBorder)}
        <span>${escapeHtml(authorName || "Someone")}</span>
        ${liveAuthor && liveAuthor.pronouns ? `<span style="font-size:0.72rem;opacity:0.55;">(${escapeHtml(liveAuthor.pronouns)})</span>` : ""}
        ${authorIsDev ? `<img src="Icons/devicon.png" alt="Developer" title="Developer" style="width:14px;height:14px;border-radius:4px;vertical-align:middle;">` : ""}
        ${badgeRowHtml(liveAuthor ? liveAuthor.equippedBadges : post.authorEquippedBadges, 14)}
        <span class="sep">&middot;</span>
        <span>${timeAgo(post.createdAt)}</span>
      </div>
      <h3>${escapeHtml(post.title)}</h3>
      ${post.body ? `<p class="body">${escapeHtml(post.body)}</p>` : ""}
      ${post.mediaData && post.mediaType === "image" ? `<div class="post-media"><img src="${post.mediaData}" alt="Post image" loading="lazy"></div>` : ""}
      ${post.mediaData && post.mediaType === "video" ? `<div class="post-media"><video src="${post.mediaData}" controls muted playsinline preload="metadata"></video></div>` : ""}
      <div class="reaction-bar" id="reactions-${post.id}">
        ${(["🔥","❤️","😂","😮","👏"]).map(emoji => {
          const count = (post._reactions && post._reactions[emoji]) || 0;
          const reacted = post._myReaction === emoji;
          return `<button class="reaction-btn${reacted ? " reacted" : ""}" data-emoji="${emoji}" data-id="${post.id}">${emoji}${count > 0 ? ` <span>${count}</span>` : ""}</button>`;
        }).join("")}
      </div>
      <div class="post-actions">
        <div class="vote-group">
          <button class="vote-btn upvote ${userVote === 1 ? "voted" : ""}" data-id="${post.id}" aria-label="Upvote">&#9650;</button>
          <span class="vote-count">${post.score || 0}</span>
          <button class="vote-btn downvote ${userVote === -1 ? "voted" : ""}" data-id="${post.id}" aria-label="Downvote">&#9660;</button>
        </div>
        <button class="icon-btn comment-toggle" data-id="${post.id}">
          💬 ${post.commentCount || 0}
        </button>
        ${currentUser && currentUser.uid === post.authorId ? `<button class="icon-btn delete-post" data-id="${post.id}">🗑 Delete</button>` : ""}
      </div>
      <div class="comments ${isCommentsOpen ? "open" : ""}" id="comments-${post.id}">
        <div class="comments-list">${renderCommentsListHtml(post.id, comments)}</div>
        ${currentUser ? `
          <div class="comment-form">
            <input type="text" placeholder="Add a comment&hellip;" maxlength="500" id="commentInput-${post.id}">
            <button data-id="${post.id}" class="send-comment">Send</button>
          </div>
        ` : `<p style="font-size:0.82rem;color:var(--ink-soft);margin-top:8px;">Sign in to join the conversation.</p>`}
      </div>
    </div>
  `;
}

function attachPostListeners(postId) {
  const root = document.querySelector(`.post[data-id="${postId}"]`);
  if (!root) return;

  root.querySelectorAll(".reaction-btn").forEach(btn => {
    btn.addEventListener("click", () => handleReaction(postId, btn.dataset.emoji, btn));
  });

  root.querySelector(".upvote").addEventListener("click", (e) => {
    e.currentTarget.classList.remove("pop");
    void e.currentTarget.offsetWidth;
    e.currentTarget.classList.add("pop");
    handleVote(postId, 1);
  });
  root.querySelector(".downvote").addEventListener("click", (e) => {
    e.currentTarget.classList.remove("pop");
    void e.currentTarget.offsetWidth;
    e.currentTarget.classList.add("pop");
    handleVote(postId, -1);
  });

  root.querySelector(".comment-toggle").addEventListener("click", () => {
    const panel = document.getElementById(`comments-${postId}`);
    if (openComments.has(postId)) {
      openComments.delete(postId);
      panel.classList.remove("open");
    } else {
      openComments.add(postId);
      panel.classList.add("open");
    }
  });

  const delBtn = root.querySelector(".delete-post");
  if (delBtn) {
    delBtn.addEventListener("click", async () => {
      if (!confirm("Delete this post?")) return;
      try {
        await deleteDoc(doc(db, "posts", postId));
        showToast("Post deleted");
      } catch (err) {
        showToast("Couldn't delete post");
      }
    });
  }

  const sendBtn = root.querySelector(".send-comment");
  if (sendBtn) {
    sendBtn.addEventListener("click", () => submitComment(postId));
    const input = root.querySelector(`#commentInput-${postId}`);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") submitComment(postId);
    });
  }
}

async function handleVote(postId, dir) {
  if (!currentUser) return openAuthModal("signin");
  const post = allPosts.find(p => p.id === postId);
  if (!post) return;

  const voteRef = doc(db, "posts", postId, "votes", currentUser.uid);
  const existing = post._myVote || 0;
  const newVote = existing === dir ? 0 : dir;
  const delta = newVote - existing;

  // Only "upvotes received" count toward the popular badge — track the +1 state transition specifically.
  const wasUpvoted = existing === 1;
  const isNowUpvoted = newVote === 1;
  let upvoteDelta = 0;
  if (!wasUpvoted && isNowUpvoted) upvoteDelta = 1;
  else if (wasUpvoted && !isNowUpvoted) upvoteDelta = -1;

  try {
    if (newVote === 0) {
      await deleteDoc(voteRef);
    } else {
      await setDoc(voteRef, { value: newVote });
    }
    await updateDoc(doc(db, "posts", postId), { score: increment(delta) });
    if (upvoteDelta !== 0 && post.authorId) {
      await setDoc(doc(db, "users", post.authorId), { totalUpvotes: increment(upvoteDelta) }, { merge: true });
      const cachedAuthor = userCache.get(post.authorId);
      if (cachedAuthor) cachedAuthor.totalUpvotes = (cachedAuthor.totalUpvotes || 0) + upvoteDelta;
    }
  } catch (err) {
    showToast("Couldn't register vote");
  }
}

async function submitComment(postId) {
  if (!currentUser) return openAuthModal("signin");
  const input = document.getElementById(`commentInput-${postId}`);
  const text = input.value.trim();
  if (!text) return;

  input.disabled = true;
  try {
    const myUserSnap = await getDoc(doc(db, "users", currentUser.uid));
    const myIsDeveloper = myUserSnap.exists() && myUserSnap.data().isDeveloper === true;
    await addDoc(collection(db, "posts", postId, "comments"), {
      text,
      authorId: currentUser.uid,
      authorName: currentUser.displayName || currentUser.email.split("@")[0],
      authorIsDeveloper: myIsDeveloper,
      authorEquippedBadges: (myProfile && myProfile.equippedBadges) || [],
      createdAt: serverTimestamp()
    });
    await updateDoc(doc(db, "posts", postId), { commentCount: increment(1) });
    input.value = "";
  } catch (err) {
    showToast("Couldn't post comment");
  } finally {
    input.disabled = false;
  }
}

/* ---------------- LIVE DATA ---------------- */

function listenToPosts() {
  const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snap) => {
    const posts = [];
    snap.forEach(d => posts.push({ id: d.id, ...d.data() }));

    const prevIds = allPosts.map(p => p.id).join(",");
    const nextIds = posts.map(p => p.id).join(",");
    const idsChanged = prevIds !== nextIds;

    // preserve existing local state (comments/votes/reactions) already loaded
    posts.forEach(p => {
      const existing = allPosts.find(ep => ep.id === p.id);
      if (existing) {
        p._comments = existing._comments;
        p._myVote = existing._myVote;
        p._reactions = existing._reactions;
        p._myReaction = existing._myReaction;
      }
    });

    allPosts = posts;

    // Only rebuild the whole feed DOM when the set/order of posts actually changed
    // (new post, deleted post, sort change). In-place updates (votes, reactions,
    // comments) are handled by their own listeners and must never trigger this.
    if (idsChanged) {
      renderFeed();
    } else {
      // update score/commentCount text in place without touching the DOM tree
      posts.forEach(p => {
        const root = document.querySelector(`.post[data-id="${p.id}"]`);
        if (!root) return;
        const countEl = root.querySelector(".vote-count");
        if (countEl) countEl.textContent = p.score || 0;
        const commentToggle = root.querySelector(".comment-toggle");
        if (commentToggle) commentToggle.innerHTML = `💬 ${p.commentCount || 0}`;
      });
    }

    posts.forEach(p => {
      listenToComments(p.id);
      listenToReactions(p.id);
      if (currentUser) listenToMyVote(p.id);
      if (!userCache.has(p.authorId)) {
        getUserProfile(p.authorId).then(() => {
          const root = document.querySelector(`.post[data-id="${p.id}"]`);
          if (!root) return;
          const liveAuthor = userCache.get(p.authorId);
          if (!liveAuthor) return;
          const nameEl = root.querySelector(".post-meta span");
          if (nameEl && liveAuthor.displayName) nameEl.textContent = liveAuthor.displayName;
        });
      }
    });
  });
}

const commentUnsubs = {};
function renderCommentsListHtml(postId, comments) {
  return comments.map(c => {
    const liveC = userCache.get(c.authorId);
    const cName = (liveC && liveC.displayName) || c.authorName;
    const cPhoto = liveC && liveC.photoURL;
    const cIsDev = liveC ? liveC.isDeveloper : c.authorIsDeveloper;
    return `
      <div class="comment">
        ${avatarHtml(cName, cPhoto, 22, liveC && liveC.avatarBorder)}
        <div class="comment-body">
          <div class="comment-meta">${escapeHtml(cName || "Someone")} ${cIsDev ? `<img src="Icons/devicon.png" alt="Developer" title="Developer" style="width:12px;height:12px;border-radius:3px;vertical-align:middle;">` : ""} ${badgeRowHtml(liveC ? liveC.equippedBadges : c.authorEquippedBadges, 12)} &middot; ${timeAgo(c.createdAt)}</div>
          <div class="comment-text">${escapeHtml(c.text)}</div>
        </div>
      </div>
    `;
  }).join("");
}

function listenToComments(postId) {
  if (commentUnsubs[postId]) return;
  const q = query(collection(db, "posts", postId, "comments"), orderBy("createdAt", "asc"));
  commentUnsubs[postId] = onSnapshot(q, (snap) => {
    const comments = [];
    snap.forEach(d => comments.push(d.data()));

    const post = allPosts.find(p => p.id === postId);
    if (post) post._comments = comments;

    const refreshCommentsList = () => {
      const panel = document.getElementById(`comments-${postId}`);
      if (!panel) return;
      const list = panel.querySelector(".comments-list");
      if (list) list.innerHTML = renderCommentsListHtml(postId, comments);
    };

    const missingAuthors = comments.filter(c => c.authorId && !userCache.has(c.authorId));
    if (missingAuthors.length > 0) {
      Promise.all(missingAuthors.map(c => getUserProfile(c.authorId))).then(refreshCommentsList);
    } else {
      refreshCommentsList();
    }

    const toggle = document.querySelector(`.post[data-id="${postId}"] .comment-toggle`);
    if (toggle) toggle.innerHTML = `💬 ${comments.length}`;
  });
}

const reactionUnsubs = {};
const REACTION_EMOJIS = ["🔥","❤️","😂","😮","👏"];

function listenToReactions(postId) {
  if (reactionUnsubs[postId]) return;
  reactionUnsubs[postId] = onSnapshot(
    collection(db, "posts", postId, "reactions"),
    (snap) => {
      const post = allPosts.find(p => p.id === postId);
      if (!post) return;
      const counts = {};
      snap.forEach(d => {
        const v = d.data().emoji;
        if (v) counts[v] = (counts[v] || 0) + 1;
      });
      post._reactions = counts;
      post._myReaction = currentUser
        ? (snap.docs.find(d => d.id === currentUser.uid)?.data().emoji || null)
        : null;
      const bar = document.getElementById(`reactions-${postId}`);
      if (bar) {
        bar.innerHTML = REACTION_EMOJIS.map(emoji => {
          const count = counts[emoji] || 0;
          const reacted = post._myReaction === emoji;
          return `<button class="reaction-btn${reacted ? " reacted" : ""}" data-emoji="${emoji}" data-id="${postId}">${emoji}${count > 0 ? ` <span>${count}</span>` : ""}</button>`;
        }).join("");
        bar.querySelectorAll(".reaction-btn").forEach(btn => {
          btn.addEventListener("click", () => handleReaction(postId, btn.dataset.emoji, btn));
        });
      }
    }
  );
}

async function handleReaction(postId, emoji, btn) {
  if (!currentUser) return openAuthModal("signin");
  btn.classList.remove("pop"); void btn.offsetWidth; btn.classList.add("pop");
  const post = allPosts.find(p => p.id === postId);
  const reactionRef = doc(db, "posts", postId, "reactions", currentUser.uid);
  const isSame = post && post._myReaction === emoji;
  try {
    if (isSame) { await deleteDoc(reactionRef); }
    else { await setDoc(reactionRef, { emoji, uid: currentUser.uid }); }
  } catch (err) { showToast("Couldn't save reaction"); }
}

const voteUnsubs = {};
function listenToMyVote(postId) {
  if (!currentUser || voteUnsubs[postId]) return;
  const ref = doc(db, "posts", postId, "votes", currentUser.uid);
  voteUnsubs[postId] = onSnapshot(ref, (snap) => {
    const post = allPosts.find(p => p.id === postId);
    if (post) {
      post._myVote = snap.exists() ? snap.data().value : 0;
      const root = document.querySelector(`.post[data-id="${postId}"]`);
      if (root) {
        const upBtn = root.querySelector(".upvote");
        const downBtn = root.querySelector(".downvote");
        const countEl = root.querySelector(".vote-count");
        if (upBtn) upBtn.classList.toggle("voted", post._myVote === 1);
        if (downBtn) downBtn.classList.toggle("voted", post._myVote === -1);
        if (countEl) countEl.textContent = post.score || 0;
      }
    }
  });
}

/* ---------------- AUTH STATE ---------------- */

onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  myProfile = null;
  if (user) {
    myProfile = await getUserProfile(user.uid);
    userCache.set(user.uid, myProfile);
  }
  renderAuthArea();
  if (user) {
    allPosts.forEach(p => listenToMyVote(p.id));
  }
});

/* ---------------- INIT ---------------- */

listenToPosts();
setTimeout(() => playShimmer(topbar), 300);

  </script>
