<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Foyer</title>
  <link rel="icon" type="image/png" href="Icons/icon.png">
   
  <link rel="apple-touch-icon" href="Icons/icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#FAFAF8">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --floor: #FAFAF8;
      --tile: #FFFFFF;
      --seam: #E8E6E1;
      --stone-shadow: #C9C5BC;
      --ink: #2B2A28;
      --ink-soft: #6B6862;
      --vein: #8E97A8;
      --vein-deep: #6F7A8E;
      --shimmer: rgba(255, 255, 255, 0.85);
      --danger: #B3493F;
      --radius: 16px;
      --radius-sm: 10px;
      font-size: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--floor);
      color: var(--ink);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      height: 100%;
      overscroll-behavior-y: none;
    }

    /* polished floor base texture: soft radial sheen + tile grid */
    body {
      background-image:
        radial-gradient(ellipse 900px 500px at 20% -10%, rgba(255, 255, 255, 0.9), transparent 60%),
        radial-gradient(ellipse 700px 400px at 100% 30%, rgba(255, 255, 255, 0.6), transparent 60%),
        linear-gradient(var(--seam) 1px, transparent 1px),
        linear-gradient(90deg, var(--seam) 1px, transparent 1px);
      background-size: auto, auto, 96px 96px, 96px 96px;
      background-color: var(--floor);
      min-height: 100vh;
    }

    h1,
    h2,
    h3,
    .display {
      font-family: "Fraunces", serif;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }

    input,
    textarea {
      font-family: inherit;
    }

    /* ---------- shimmer keyframes ---------- */
    @keyframes sweep {
      0% {
        transform: translateX(-120%) rotate(8deg);
      }

      100% {
        transform: translateX(220%) rotate(8deg);
      }
    }

    .shimmer-surface {
      position: relative;
      overflow: hidden;
    }

    .shimmer-surface::after {
      content: "";
      position: absolute;
      top: -50%;
      left: 0;
      width: 40%;
      height: 220%;
      background: linear-gradient(100deg,
          transparent 30%,
          rgba(255, 255, 255, 0.55) 48%,
          rgba(255, 255, 255, 0.85) 50%,
          rgba(255, 255, 255, 0.55) 52%,
          transparent 70%);
      pointer-events: none;
      opacity: 0;
    }

    .shimmer-surface.shimmer-play::after {
      opacity: 1;
      animation: sweep 1.1s ease-out;
    }

    /* ---------- top bar ---------- */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 22px;
      margin: 14px 16px 0 16px;
      background: linear-gradient(180deg, #FFFFFF, #FBFBF9);
      border-radius: var(--radius);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 -6px 14px -8px rgba(0, 0, 0, 0.04) inset,
        0 10px 24px -12px rgba(60, 55, 45, 0.18),
        0 2px 6px rgba(60, 55, 45, 0.06);
      border: 1px solid var(--seam);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand img {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: block;
    }

    .brand .name {
      font-family: "Fraunces", serif;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .brand .name .dot {
      color: var(--vein);
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ---------- buttons ---------- */
    .btn {
      border: 1px solid var(--seam);
      background: linear-gradient(180deg, #FFFFFF, #F7F6F3);
      color: var(--ink);
      padding: 9px 16px;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.9) inset, 0 2px 5px rgba(60, 55, 45, 0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.9) inset, 0 4px 10px rgba(60, 55, 45, 0.12);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(180deg, var(--vein), var(--vein-deep));
      color: #fff;
      border: 1px solid var(--vein-deep);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.35) inset, 0 4px 12px rgba(111, 122, 142, 0.35);
    }

    .btn-primary:hover {
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.35) inset, 0 6px 16px rgba(111, 122, 142, 0.45);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid transparent;
      box-shadow: none;
      color: var(--ink-soft);
    }

    .btn-ghost:hover {
      background: var(--seam);
      box-shadow: none;
    }

    .btn-danger {
      color: var(--danger);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .avatar-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px 6px 6px;
      border-radius: 999px;
      background: var(--seam);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink-soft);
    }

    .avatar-circle {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(160deg, var(--vein), var(--vein-deep));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ---------- layout ---------- */
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 16px 80px;
    }

    .composer {
      background: linear-gradient(180deg, #FFFFFF, #FBFBF9);
      border: 1px solid var(--seam);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 26px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 14px 30px -16px rgba(60, 55, 45, 0.16),
        0 2px 6px rgba(60, 55, 45, 0.05);
    }

    .composer textarea,
    .composer input[type="text"] {
      width: 100%;
      border: 1px solid var(--seam);
      background: var(--floor);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-size: 0.95rem;
      color: var(--ink);
      resize: vertical;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .composer input[type="text"] {
      margin-bottom: 10px;
    }

    .composer textarea {
      min-height: 70px;
    }

    .composer textarea:focus,
    .composer input[type="text"]:focus {
      border-color: var(--vein);
      box-shadow: 0 0 0 3px rgba(142, 151, 168, 0.16);
    }

    .composer-foot {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .composer-hint {
      font-size: 0.8rem;
      color: var(--ink-soft);
      margin-right: auto;
    }

    .feed-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 4px;
    }

    .feed-header h2 {
      font-size: 1.05rem;
      color: var(--ink-soft);
      font-weight: 500;
    }

    .sort-tabs {
      display: flex;
      gap: 4px;
      background: var(--seam);
      padding: 3px;
      border-radius: 999px;
    }

    .sort-tabs button {
      border: none;
      background: transparent;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink-soft);
    }

    .sort-tabs button.active {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 1px 3px rgba(60, 55, 45, 0.15);
    }

    /* ---------- post tile ---------- */
    .post {
      background: var(--tile);
      border: 1px solid var(--seam);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 14px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 10px 22px -14px rgba(60, 55, 45, 0.14),
        0 1px 4px rgba(60, 55, 45, 0.05);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .post:hover {
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 16px 30px -16px rgba(60, 55, 45, 0.20),
        0 2px 6px rgba(60, 55, 45, 0.06);
      transform: translateY(-2px);
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    .post-meta .sep {
      opacity: 0.5;
    }

    .post h3 {
      font-size: 1.12rem;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .post p.body {
      font-size: 0.92rem;
      color: #45433f;
      line-height: 1.55;
      margin: 0 0 12px 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .post-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .vote-group {
      display: flex;
      align-items: center;
      gap: 2px;
      background: var(--floor);
      border: 1px solid var(--seam);
      border-radius: 999px;
      padding: 4px 6px;
    }

    .vote-btn {
      border: none;
      background: transparent;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-soft);
      font-size: 0.95rem;
      padding: 0;
    }

    .vote-btn:hover {
      background: var(--seam);
    }

    .vote-btn.voted {
      color: var(--vein-deep);
    }

    .vote-count {
      font-size: 0.85rem;
      font-weight: 700;
      min-width: 22px;
      text-align: center;
    }

    .icon-btn {
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink-soft);
    }

    .icon-btn:hover {
      background: var(--seam);
    }

    .icon-btn svg {
      width: 15px;
      height: 15px;
    }

    /* ---------- comments ---------- */
    .comments {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--seam);
      display: none;
    }

    .comments.open {
      display: block;
    }

    .comment {
      display: flex;
      gap: 10px;
      padding: 8px 0;
    }

    .comment .avatar-circle {
      width: 22px;
      height: 22px;
      font-size: 0.65rem;
    }

    .comment-body {
      flex: 1;
    }

    .comment-meta {
      font-size: 0.76rem;
      color: var(--ink-soft);
      margin-bottom: 2px;
      font-weight: 600;
    }

    .comment-text {
      font-size: 0.88rem;
      color: #3c3a36;
      line-height: 1.45;
    }

    .comment-form {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .comment-form input {
      flex: 1;
      border: 1px solid var(--seam);
      background: var(--floor);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.85rem;
      outline: none;
    }

    .comment-form input:focus {
      border-color: var(--vein);
      box-shadow: 0 0 0 3px rgba(142, 151, 168, 0.16);
    }

    .comment-form button {
      border: none;
      background: var(--vein);
      color: #fff;
      border-radius: 999px;
      padding: 0 16px;
      font-weight: 700;
      font-size: 0.85rem;
    }

    /* ---------- empty / loading states ---------- */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft);
    }

    .empty-state .display {
      font-size: 1.3rem;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 0.9rem;
      margin: 0;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2.5px solid var(--seam);
      border-top-color: var(--vein);
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-wrap {
      padding: 50px 0;
    }

    /* ---------- auth modal ---------- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(43, 42, 40, 0.35);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .modal {
      background: linear-gradient(180deg, #FFFFFF, #FBFBF9);
      border-radius: 20px;
      padding: 30px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 30px 60px -20px rgba(43, 42, 40, 0.35), 0 1px 0 rgba(255, 255, 255, 0.9) inset;
      border: 1px solid var(--seam);
      position: relative;
      overflow: hidden;
    }

    .modal h2 {
      font-size: 1.4rem;
      margin-bottom: 4px;
    }

    .modal .sub {
      color: var(--ink-soft);
      font-size: 0.88rem;
      margin-bottom: 20px;
    }

    .modal label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-soft);
      margin-bottom: 5px;
      margin-top: 14px;
    }

    .modal input {
      width: 100%;
      border: 1px solid var(--seam);
      background: var(--floor);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      font-size: 0.92rem;
      outline: none;
    }

    .modal input:focus {
      border-color: var(--vein);
      box-shadow: 0 0 0 3px rgba(142, 151, 168, 0.16);
    }

    .modal .btn-primary {
      width: 100%;
      margin-top: 20px;
      padding: 11px;
      font-size: 0.92rem;
    }

    .modal .switch-mode {
      text-align: center;
      margin-top: 16px;
      font-size: 0.84rem;
      color: var(--ink-soft);
    }

    .modal .switch-mode button {
      border: none;
      background: none;
      color: var(--vein-deep);
      font-weight: 700;
      font-size: 0.84rem;
      padding: 0;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      border: none;
      background: var(--seam);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      color: var(--ink-soft);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-error {
      background: #FBEDEC;
      color: var(--danger);
      border: 1px solid #F0D2CF;
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-size: 0.82rem;
      margin-top: 14px;
      display: none;
    }

    .auth-error.show {
      display: block;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: #fff;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 200;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 480px) {
      .topbar {
        margin: 10px 10px 0 10px;
        padding: 12px 16px;
      }

      .wrap {
        padding: 20px 12px 70px;
      }

      .brand .name {
        font-size: 1.1rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .shimmer-surface::after {
        animation: none !important;
      }

      .post,
      .btn {
        transition: none !important;
      }
    }

    *:focus-visible {
      outline: 2px solid var(--vein-deep);
      outline-offset: 2px;
    }
  </style>
</head>

<body>

  <div class="topbar shimmer-surface" id="topbar">
    <div class="brand">
      <img src="Icons/icon.png" alt="Foyer">
      <span class="name">Foyer<span class="dot">.</span></span>
    </div>
    <div class="topbar-actions" id="authArea">
      <!-- filled by JS -->
    </div>
  </div>

  <div class="wrap">

    <div class="composer" id="composerCard" style="display:none;">
      <input type="text" id="postTitle" placeholder="Give it a title&hellip;" maxlength="140">
      <textarea id="postBody" placeholder="What's on your floor today?" maxlength="3000"></textarea>
      <div class="composer-foot">
        <span class="composer-hint" id="composerHint"></span>
        <button class="btn btn-ghost" id="cancelPostBtn" type="button">Clear</button>
        <button class="btn btn-primary" id="submitPostBtn" type="button">Post</button>
      </div>
    </div>

    <div class="feed-header">
      <h2 id="feedLabel">The floor</h2>
      <div class="sort-tabs">
        <button class="active" data-sort="new">New</button>
        <button data-sort="top">Top</button>
      </div>
    </div>

    <div id="feed">
      <div class="loading-wrap">
        <div class="spinner"></div>
      </div>
    </div>

  </div>

  <div id="modalRoot"></div>
  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  onAuthStateChanged, signOut, updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, addDoc, doc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy, serverTimestamp, increment,
  setDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTOWUq6Aa--67iWguc7gznvz5k91W1rJc",
  authDomain: "ardy-39e45.firebaseapp.com",
  projectId: "ardy-39e45",
  storageBucket: "ardy-39e45.firebasestorage.app",
  messagingSenderId: "828563497380",
  appId: "1:828563497380:web:04062113936e81f14f6131",
  measurementId: "G-0BB0RWM91G"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentSort = "new";
let allPosts = [];
let openComments = new Set();
let myProfile = null; // { displayName, photoURL, isDeveloper }
const userCache = new Map(); // uid -> { displayName, photoURL, isDeveloper }

const authArea = document.getElementById("authArea");
const composerCard = document.getElementById("composerCard");
const feed = document.getElementById("feed");
const modalRoot = document.getElementById("modalRoot");
const toastEl = document.getElementById("toast");
const topbar = document.getElementById("topbar");

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  setTimeout(() => toastEl.classList.remove("show"), 2200);
}

function playShimmer(el) {
  el.classList.remove("shimmer-play");
  void el.offsetWidth;
  el.classList.add("shimmer-play");
}

function initials(name) {
  if (!name) return "?";
  const parts = name.trim().split(/\s+/);
  return (parts[0][0] + (parts[1] ? parts[1][0] : "")).toUpperCase();
}

function avatarHtml(name, photoURL, sizePx) {
  const size = sizePx || 26;
  if (photoURL) {
    return `<span class="avatar-circle" style="width:${size}px;height:${size}px;padding:0;overflow:hidden;"><img src="${escapeHtml(photoURL)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></span>`;
  }
  return `<span class="avatar-circle" style="width:${size}px;height:${size}px;font-size:${Math.max(10, size * 0.4)}px;">${initials(name)}</span>`;
}

async function getUserProfile(uid) {
  if (userCache.has(uid)) return userCache.get(uid);
  try {
    const snap = await getDoc(doc(db, "users", uid));
    const data = snap.exists() ? snap.data() : {};
    const profile = {
      displayName: data.displayName || null,
      photoURL: data.photoURL || null,
      isDeveloper: data.isDeveloper === true,
      isVerifiedOverride: data.isVerifiedOverride === true,
      postCount: data.postCount || 0,
      totalUpvotes: data.totalUpvotes || 0,
      equippedBadges: Array.isArray(data.equippedBadges) ? data.equippedBadges : []
    };
    userCache.set(uid, profile);
    return profile;
  } catch (err) {
    return { displayName: null, photoURL: null, isDeveloper: false, isVerifiedOverride: false, postCount: 0, totalUpvotes: 0, equippedBadges: [] };
  }
}




const BADGE_INFO = {
  verified: { label: "Verified", icon: "Bdg/verified.png" },
  popular:  { label: "Popular",  icon: "Bdg/popular.png" },
  super:    { label: "Super Poster", icon: "Bdg/super.png" }
};
const POPULAR_UPVOTE_THRESHOLD = 100;
const SUPER_POST_THRESHOLD = 50;
const VERIFIED_DAYS_REQUIRED = 7;




function getEarnedBadges(profile, authUser) {
  const earned = [];
  const accountCreatedAt = authUser && authUser.metadata && authUser.metadata.creationTime
    ? new Date(authUser.metadata.creationTime) : null;
  const daysSinceCreation = accountCreatedAt ? (Date.now() - accountCreatedAt.getTime()) / (1000 * 60 * 60 * 24) : 0;




  if ((profile && profile.isVerifiedOverride) || daysSinceCreation >= VERIFIED_DAYS_REQUIRED) {
    earned.push("verified");
  }
  if (profile && profile.totalUpvotes >= POPULAR_UPVOTE_THRESHOLD) {
    earned.push("popular");
  }
  if (profile && profile.postCount >= SUPER_POST_THRESHOLD) {
    earned.push("super");
  }
  return earned;
}




function badgeRowHtml(equippedBadges, sizePx) {
  const size = sizePx || 14;
  if (!equippedBadges || equippedBadges.length === 0) return "";
  return equippedBadges
    .filter(key => BADGE_INFO[key])
    .map(key => `<img src="${BADGE_INFO[key].icon}" alt="${BADGE_INFO[key].label}" title="${BADGE_INFO[key].label}" style="width:${size}px;height:${size}px;vertical-align:middle;margin-left:2px;">`)
    .join("");
}

function timeAgo(ts) {
  if (!ts) return "just now";
  const date = ts.toDate ? ts.toDate() : new Date(ts);
  const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
  if (seconds < 60) return "just now";
  const mins = Math.floor(seconds / 60);
  if (mins < 60) return mins + "m ago";
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + "h ago";
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + "d ago";
  return date.toLocaleDateString();
}

  if (code.includes("too-many-requests")) return "Too many attempts. Please wait a moment and try again.";
  return "Something went wrong. Please try again.";
}

const MAX_AVATAR_BYTES = 5 * 1024 * 1024; // 5MB raw file cap, before compression
const ALLOWED_IMAGE_TYPES = ["image/jpeg", "image/png", "image/webp", "image/gif"];
const AVATAR_MAX_DIMENSION = 300; // px, longest side after resize
const FIRESTORE_FIELD_SAFE_BYTES = 700 * 1024; // stay safely under Firestore's 1MB field cap

function compressImageToBase64(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(file);

    img.onload = () => {
      URL.revokeObjectURL(objectUrl);

      let { width, height } = img;
      if (width > height && width > AVATAR_MAX_DIMENSION) {
        height = Math.round(height * (AVATAR_MAX_DIMENSION / width));
        width = AVATAR_MAX_DIMENSION;
      } else if (height > AVATAR_MAX_DIMENSION) {
        width = Math.round(width * (AVATAR_MAX_DIMENSION / height));
        height = AVATAR_MAX_DIMENSION;
      }

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);

      let quality = 0.85;
      let dataUrl = canvas.toDataURL("image/jpeg", quality);

      while (dataUrl.length > FIRESTORE_FIELD_SAFE_BYTES && quality > 0.3) {
        quality -= 0.1;
        dataUrl = canvas.toDataURL("image/jpeg", quality);
      }

      if (dataUrl.length > FIRESTORE_FIELD_SAFE_BYTES) {
        reject(new Error("Image is too detailed to compress small enough. Try a simpler image."));
        return;
      }

      resolve(dataUrl);
    };

    img.onerror = () => {
      URL.revokeObjectURL(objectUrl);
      reject(new Error("Couldn't read that image file."));
    };

    img.src = objectUrl;
  });
}

function attachPostListeners(postId) {
  const root = document.querySelector(`.post[data-id="${postId}"]`);
  if (!root) return;

  root.querySelector(".upvote").addEventListener("click", () => handleVote(postId, 1));
  root.querySelector(".downvote").addEventListener("click", () => handleVote(postId, -1));

  root.querySelector(".comment-toggle").addEventListener("click", () => {
    const panel = document.getElementById(`comments-${postId}`);
    if (openComments.has(postId)) {
      openComments.delete(postId);
      panel.classList.remove("open");
    } else {
      openComments.add(postId);
      panel.classList.add("open");
    }
  });

  const delBtn = root.querySelector(".delete-post");
  if (delBtn) {
    delBtn.addEventListener("click", async () => {
      if (!confirm("Delete this post?")) return;
      try {
        await deleteDoc(doc(db, "posts", postId));
        showToast("Post deleted");
      } catch (err) {
        showToast("Couldn't delete post");
      }
    });
  }

  const sendBtn = root.querySelector(".send-comment");
  if (sendBtn) {
    sendBtn.addEventListener("click", () => submitComment(postId));
    const input = root.querySelector(`#commentInput-${postId}`);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") submitComment(postId);
    });
  }
}

async function handleVote(postId, dir) {
  if (!currentUser) return openAuthModal("signin");
  const post = allPosts.find(p => p.id === postId);
  if (!post) return;

  const voteRef = doc(db, "posts", postId, "votes", currentUser.uid);
  const existing = post._myVote || 0;
  const newVote = existing === dir ? 0 : dir;
  const delta = newVote - existing;

  // Only "upvotes received" count toward the popular badge — track the +1 state transition specifically.
  const wasUpvoted = existing === 1;
  const isNowUpvoted = newVote === 1;
  let upvoteDelta = 0;
  if (!wasUpvoted && isNowUpvoted) upvoteDelta = 1;
  else if (wasUpvoted && !isNowUpvoted) upvoteDelta = -1;

  try {
    if (newVote === 0) {
      await deleteDoc(voteRef);
    } else {
      await setDoc(voteRef, { value: newVote });
    }
    await updateDoc(doc(db, "posts", postId), { score: increment(delta) });
    if (upvoteDelta !== 0 && post.authorId) {
      await setDoc(doc(db, "users", post.authorId), { totalUpvotes: increment(upvoteDelta) }, { merge: true });
      const cachedAuthor = userCache.get(post.authorId);
      if (cachedAuthor) cachedAuthor.totalUpvotes = (cachedAuthor.totalUpvotes || 0) + upvoteDelta;
    }
  } catch (err) {
    showToast("Couldn't register vote");
  }
}

async function submitComment(postId) {
  if (!currentUser) return openAuthModal("signin");
  const input = document.getElementById(`commentInput-${postId}`);
  const text = input.value.trim();
  if (!text) return;

  input.disabled = true;
  try {
    const myUserSnap = await getDoc(doc(db, "users", currentUser.uid));
    const myIsDeveloper = myUserSnap.exists() && myUserSnap.data().isDeveloper === true;
    await addDoc(collection(db, "posts", postId, "comments"), {
      text,
      authorId: currentUser.uid,
      authorName: currentUser.displayName || currentUser.email.split("@")[0],
      authorIsDeveloper: myIsDeveloper,
      authorEquippedBadges: (myProfile && myProfile.equippedBadges) || [],
      createdAt: serverTimestamp()
    });
    await updateDoc(doc(db, "posts", postId), { commentCount: increment(1) });
    input.value = "";
  } catch (err) {
    showToast("Couldn't post comment");
  } finally {
    input.disabled = false;
  }
}

/* ---------------- LIVE DATA ---------------- */

function listenToPosts() {
  const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snap) => {
    const posts = [];
    snap.forEach(d => posts.push({ id: d.id, ...d.data() }));

    // preserve existing comments/votes already loaded, merge new base data
    posts.forEach(p => {
      const existing = allPosts.find(ep => ep.id === p.id);
      if (existing) {
        p._comments = existing._comments;
        p._myVote = existing._myVote;
      }
    });

    allPosts = posts;
    renderFeed();

    posts.forEach(p => {
      listenToComments(p.id);
      if (currentUser) listenToMyVote(p.id);
      if (!userCache.has(p.authorId)) {
        getUserProfile(p.authorId).then(() => renderFeed());
      }
    });
  });
}

const commentUnsubs = {};
function listenToComments(postId) {
  if (commentUnsubs[postId]) return;
  const q = query(collection(db, "posts", postId, "comments"), orderBy("createdAt", "asc"));
  commentUnsubs[postId] = onSnapshot(q, (snap) => {
    const comments = [];
    snap.forEach(d => comments.push(d.data()));
    comments.forEach(c => {
      if (c.authorId && !userCache.has(c.authorId)) {
        getUserProfile(c.authorId).then(() => {
          const p = allPosts.find(pp => pp.id === postId);
          if (p && openComments.has(postId)) {
            const root = document.querySelector(`.post[data-id="${postId}"]`);
            if (root) { root.outerHTML = renderPost(p); attachPostListeners(postId); }
          }
        });
      }
    });
    const post = allPosts.find(p => p.id === postId);
    if (post) {
      post._comments = comments;
      if (openComments.has(postId)) {
        const panel = document.getElementById(`comments-${postId}`);
        if (panel) {
          const root = document.querySelector(`.post[data-id="${postId}"]`);
          if (root) {
            root.outerHTML = renderPost(post);
            attachPostListeners(postId);
          }
        }
      }
    }
  });
}

const voteUnsubs = {};
function listenToMyVote(postId) {
  if (!currentUser || voteUnsubs[postId]) return;
  const ref = doc(db, "posts", postId, "votes", currentUser.uid);
  voteUnsubs[postId] = onSnapshot(ref, (snap) => {
    const post = allPosts.find(p => p.id === postId);
    if (post) {
      post._myVote = snap.exists() ? snap.data().value : 0;
      const root = document.querySelector(`.post[data-id="${postId}"]`);
      if (root) {
        root.outerHTML = renderPost(post);
        attachPostListeners(postId);
      }
    }
  });
}

/* ---------------- AUTH STATE ---------------- */

onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  myProfile = null;
  if (user) {
    myProfile = await getUserProfile(user.uid);
    userCache.set(user.uid, myProfile);
  }
  renderAuthArea();
  if (user) {
    allPosts.forEach(p => listenToMyVote(p.id));
  }
});

/* ---------------- INIT ---------------- */

listenToPosts();
setTimeout(() => playShimmer(topbar), 300);

  </script>
